  <text x="28" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#fff">$</text>
  <!-- Wordmark -->
  <text x="64" y="40" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800" fill="#111827" letter-spacing="-0.5">
